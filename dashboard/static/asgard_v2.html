<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🛡️ Asgard High Command [FIXED]</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff1744; --gold: #ffca28; --green: #00e676; }
        body { background: #050505; color: #eee; font-family: sans-serif; margin: 0; }
        .nav { background: #111; border-bottom: 2px solid var(--red); display: flex; padding: 10px; gap: 10px; }
        .tab { padding: 10px 20px; border: 1px solid #333; cursor: pointer; border-radius: 4px; }
        .tab.active { background: var(--red); color: white; border-color: var(--red); }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        .kpi-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .kpi { flex: 1; background: #111; border: 1px solid #222; padding: 15px; border-radius: 8px; text-align: center; }
        .agent-card { background: #16161a; border: 1px solid #333; padding: 12px; margin-bottom: 8px; border-radius: 6px; }
        .agent-card.responding { border-color: var(--red); box-shadow: 0 0 10px var(--red); }
    </style>
</head>
<body>
    <div class="nav">
        <div class="tab active" onclick="show('incidents', this)">🛡️ Incidents</div>
        <div class="tab" onclick="show('footholds', this)">👣 Footholds</div>
        <div class="tab" onclick="show('tenants', this)">⚙️ Tenants</div>
    </div>

    <div id="incidents" class="content active">
        <h2>Strategic Overview</h2>
        <div class="kpi-row">
            <div class="kpi"><div style="font-size:2em; color:var(--red);" id="count">0</div><div>Active Incidents</div></div>
            <div class="kpi"><div style="font-size:20px; color:var(--green);">CONNECTED</div><div>Wazuh/XDR</div></div>
        </div>
        <div id="board" style="display:flex; gap:20px;">
            <div style="flex:1;"><h3>Monitoring</h3><div id="list-monitoring"></div></div>
            <div style="flex:1;"><h3>Responding</h3><div id="list-responding"></div></div>
        </div>
    </div>

    <div id="footholds" class="content">
        <h2>Persistent Footholds</h2>
        <p>No persistence mechanism anomalies detected in the last scan.</p>
    </div>

    <div id="tenants" class="content">
        <h2>Realm Manager</h2>
        <iframe src="realm_manager.html" style="width:100%; height:500px; border:1px solid #333;"></iframe>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zhvxjuhgfudavxrfsasn.supabase.co', 'sb_publishable_6RNTxeaqITfQxj1mCF263Q_5E_n-4Yb');
        
        function show(id, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function sync() {
            const { data: logs } = await _supabase.from('agent_logs').select('*').order('created_at', { ascending: false });
            if (!logs) return;
            const squad = ['Bruce', 'Thor', 'Loki', 'Heimdall', 'Lady Sif', 'Coulson', 'Erik', 'Odin'];
            const icons = {'Bruce': '🦞', 'Thor': '⚡', 'Loki': '🕵️‍♂️', 'Heimdall': '👁️', 'Lady Sif': '🗡️', 'Coulson': '💼', 'Erik': '🏗️', 'Odin': '👑'};
            
            document.getElementById('list-monitoring').innerHTML = '';
            document.getElementById('list-responding').innerHTML = '';
            let active = 0;

            squad.forEach(name => {
                const log = logs.find(l => l.agent_name.toLowerCase().includes(name.toLowerCase())) || {status: 'ACTIVE', task_description: 'On watch.'};
                const card = document.createElement('div');
                card.className = 'agent-card' + (log.status === 'RESPONDING' ? ' responding' : '');
                card.innerHTML = icons[name] + ' <strong>' + name + '</strong><br><small>' + log.task_description + '</small>';
                
                if(log.status === 'RESPONDING') {
                    document.getElementById('list-responding').appendChild(card);
                    active++;
                } else {
                    document.getElementById('list-monitoring').appendChild(card);
                }
            });
            document.getElementById('count').innerText = active;
        }
        setInterval(sync, 10000); sync();
    </script>
</body>
</html>
